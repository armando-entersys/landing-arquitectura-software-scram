version: '3.8'

services:
  agentic-architect:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scram-agentic-architect
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      - analytics-data:/app/.analytics
    networks:
      - traefik
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agentic-architect.rule=Host(`arquitectura-software.scram2k.com`)"
      - "traefik.http.routers.agentic-architect.entrypoints=websecure"
      - "traefik.http.routers.agentic-architect.tls.certresolver=letsencrypt"
      - "traefik.http.services.agentic-architect.loadbalancer.server.port=3000"
      # Security headers
      - "traefik.http.middlewares.agentic-architect-security.headers.frameDeny=true"
      - "traefik.http.middlewares.agentic-architect-security.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.agentic-architect-security.headers.browserXssFilter=true"
      - "traefik.http.middlewares.agentic-architect-security.headers.stsSeconds=31536000"
      - "traefik.http.routers.agentic-architect.middlewares=agentic-architect-security"

volumes:
  analytics-data:

networks:
  traefik:
    external: true
